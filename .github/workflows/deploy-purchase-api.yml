name: Deploy Purchase API to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'erp/services/purchase-api/**'
      - '.github/workflows/deploy-purchase-api.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: erp/services/purchase-api
        run: npm install

      - name: Build TypeScript
        working-directory: erp/services/purchase-api
        run: npm run build

      - name: Prune dev dependencies
        working-directory: erp/services/purchase-api
        run: npm prune --production

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ge-erp-api
          package: erp/services/purchase-api
